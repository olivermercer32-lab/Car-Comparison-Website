<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Compare | Login</title>
    <style>
        body{
            margin:0;
            color:#6a6f8c;
            background:#0d1117;
            font:600 16px/18px 'Open Sans',sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        *,:after,:before{box-sizing:border-box}
        .clearfix:after,.clearfix:before{content:'';display:table}
        .clearfix:after{clear:both;display:block}
        a{color:inherit;text-decoration:none}

        .login-wrap{
            width:100%;
            margin:auto;
            max-width:525px;
            min-height:670px;
            position:relative;
            background:url(https://raw.githubusercontent.com/khadkamhn/day-01-login-form/master/img/bg.jpg) no-repeat center;
            box-shadow:0 12px 15px 0 rgba(0,0,0,.24),0 17px 50px 0 rgba(0,0,0,.19);
            border-radius: 16px;
            overflow: hidden;
        }
        .login-html{
            width:100%;
            height:100%;
            position:absolute;
            padding:90px 70px 50px 70px;
            background:rgba(13, 17, 23, 0.9);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .login-html .sign-in-htm,
        .login-html .sign-up-htm{
            top:0;
            left:0;
            right:0;
            bottom:0;
            position:absolute;
            transform:rotateY(180deg);
            backface-visibility:hidden;
            transition:all .4s linear;
        }
        .login-html .sign-in,
        .login-html .sign-up,
        .login-form .group .check{
            display:none;
        }
        .login-html .tab,
        .login-form .group .label,
        .login-form .group .button{
            text-transform:uppercase;
        }
        .login-html .tab{
            font-size:22px;
            margin-right:15px;
            padding-bottom:5px;
            margin:0 15px 10px 0;
            display:inline-block;
            border-bottom:2px solid transparent;
            cursor:pointer;
            color: #4f5666;
        }
        .login-html .sign-in:checked + .tab,
        .login-html .sign-up:checked + .tab{
            color:#fff;
            border-color:#4ade80;
        }
        .login-form{
            min-height:345px;
            position:relative;
            perspective:1000px;
            transform-style:preserve-3d;
        }
        .login-form .group{
            margin-bottom:15px;
        }
        .login-form .group .label,
        .login-form .group .input,
        .login-form .group .button{
            width:100%;
            color:#fff;
            display:block;
        }
        .login-form .group .input,
        .login-form .group .button{
            border:none;
            padding:15px 20px;
            border-radius:25px;
            background:rgba(255,255,255,.05);
            outline: none;
        }
        .login-form .group .input:focus {
            background: rgba(255,255,255,.1);
            box-shadow: 0 0 0 1px #4ade80;
        }
        .login-form .group input[data-type="password"]{
            -webkit-text-security:circle;
        }
        .login-form .group .label{
            color:#aaa;
            font-size:12px;
            margin-bottom: 5px;
        }
        .login-form .group .button{
            background:#4ade80;
            color: #0d1117;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .login-form .group .button:hover {
            opacity: 0.9;
        }
        .login-form .group label .icon{
            width:15px;
            height:15px;
            border-radius:2px;
            position:relative;
            display:inline-block;
            background:rgba(255,255,255,.1);
        }
        .login-form .group label .icon:before,
        .login-form .group label .icon:after{
            content:'';
            width:10px;
            height:2px;
            background:#fff;
            position:absolute;
            transition:all .2s ease-in-out 0s;
        }
        .login-form .group label .icon:before{
            left:3px;
            width:5px;
            bottom:6px;
            transform:scale(0) rotate(0);
        }
        .login-form .group label .icon:after{
            top:6px;
            right:0;
            transform:scale(0) rotate(0);
        }
        .login-form .group .check:checked + label{
            color:#fff;
        }
        .login-form .group .check:checked + label .icon{
            background:#4ade80;
        }
        .login-form .group .check:checked + label .icon:before{
            transform:scale(1) rotate(45deg);
        }
        .login-form .group .check:checked + label .icon:after{
            transform:scale(1) rotate(-45deg);
        }
        .login-html .sign-in:checked + .tab + .sign-up + .tab + .login-form .sign-in-htm{
            transform:rotate(0);
        }
        .login-html .sign-up:checked + .tab + .login-form .sign-up-htm{
            transform:rotate(0);
        }

        .hr{
            height:2px;
            margin:40px 0 30px 0;
            background:rgba(255,255,255,.1);
        }
        .foot-lnk{
            text-align:center;
            font-size: 14px;
        }
        .alert-error {
            color: #fc8181;
            font-size: 12px;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-html">
            <input id="tab-1" type="radio" name="tab" class="sign-in" checked><label for="tab-1" class="tab">Sign In</label>
            <input id="tab-2" type="radio" name="tab" class="sign-up"><label for="tab-2" class="tab">Sign Up</label>
            <div class="login-form">
                <form id="signInForm" class="sign-in-htm" onsubmit="handleSignIn(event)">
                    <div id="signInError" class="alert-error"></div>
                    <div class="group">
                        <label for="user" class="label">Username</label>
                        <input id="user" type="text" class="input" required>
                    </div>
                    <div class="group">
                        <label for="pass" class="label">Password</label>
                        <input id="pass" type="password" class="input" data-type="password" required>
                    </div>
                    <div class="group">
                        <input id="check" type="checkbox" class="check" checked>
                        <label for="check"><span class="icon"></span> Keep me Signed in</label>
                    </div>
                    <div class="group">
                        <input type="submit" class="button" value="Sign In">
                    </div>
                    <div class="hr"></div>
                    <div class="foot-lnk">
                        <a href="#forgot">Forgot Password?</a>
                    </div>
                </form>

                <form id="signUpForm" class="sign-up-htm" onsubmit="handleSignUp(event)">
                    <div id="signUpError" class="alert-error"></div>
                    <div class="group">
                        <label for="user-signup" class="label">Username</label>
                        <input id="user-signup" type="text" class="input" required>
                    </div>
                    <div class="group">
                        <label for="pass-signup" class="label">Password</label>
                        <input id="pass-signup" type="password" class="input" data-type="password" required>
                    </div>
                    <div class="group">
                        <label for="pass-repeat" class="label">Repeat Password</label>
                        <input id="pass-repeat" type="password" class="input" data-type="password" required>
                    </div>
                    <div class="group">
                        <label for="email" class="label">Email Address</label>
                        <input id="email" type="email" class="input" required>
                    </div>
                    <div class="group">
                        <input type="submit" class="button" value="Sign Up">
                    </div>
                    <div class="hr"></div>
                    <div class="foot-lnk">
                        <label for="tab-1" style="cursor:pointer; color:#4ade80;">Already Member?</label>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function handleSignIn(e) {
            e.preventDefault();
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value;
            const errDiv = document.getElementById('signInError');

            const accounts = JSON.parse(localStorage.getItem('carCompare_users') || '{}');

                if (!accounts[user] || accounts[user].password !== pass) {
                errDiv.textContent = "Invalid username or password configuration.";
                return;
            }

            localStorage.setItem('carCompare_currentUser', user);
            window.location.href = 'index.html';
        }

        function handleSignUp(e) {
            e.preventDefault();
            const user = document.getElementById('user-signup').value.trim();
            const pass = document.getElementById('pass-signup').value;
            const repeat = document.getElementById('pass-repeat').value;
            const errDiv = document.getElementById('signUpError');

            if (pass !== repeat) {
                errDiv.textContent = "Error: Passwords configurations do not match.";
                return;
            }

            const accounts = JSON.parse(localStorage.getItem('carCompare_users') || '{}');

            if (accounts[user]) {
                errDiv.textContent = "Username is already registered in the matrix.";
                return;
            }

            accounts[user] = { password: pass, favorites: [] };
            localStorage.setItem('carCompare_users', JSON.stringify(accounts));
            localStorage.setItem('carCompare_currentUser', user);
            
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
